<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes"/>
<title>FARO — Fichero Analítico de Registro y Observación</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<!-- pdf.js — extracción local de PDFs, sin servidor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
</script>
<!-- mammoth.js — extracción local de .docx, sin servidor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── LIGHT THEME (predeterminado) ── */
[data-theme="light"]{
  --bg:#F5EDD4;--bg2:#FEFAF2;--bg3:#F0E8D0;
  --border:#C4B49A;--border2:#D4C9B0;
  --text:#1C1C14;--text2:#5C5040;--text3:#8A7A68;--text4:#B0A28E;
  --green-dark:#1E3A2F;--green-mid:#2D6A4F;--green-pale:#1A3328;
  --amber:#B85C38;--purple:#7B5EA7;--blue:#2A5A8C;
  --sidebar-bg:#1A3328;--sidebar-border:rgba(245,237,212,.08);
  --sidebar-text:#E8DFC8;--sidebar-sub:rgba(245,237,212,.42);
  --sidebar-section:rgba(245,237,212,.28);
  --card-bg:#FEFAF2;--card-border:#D4C9B0;
  --input-bg:#FEFAF2;--input-border:#C4B49A;
  --header-bg:rgba(245,237,212,.96);--header-border:#C4B49A;
  --toolbar-bg:rgba(245,237,212,.7);
  --zone-bg:rgba(245,237,212,.5);
  --annot-bg:#F5EDD4;
  --shadow:rgba(0,0,0,.08);--shadow2:rgba(0,0,0,.15);
  --hl-yellow:rgba(255,220,50,.45);--hl-yellow-h:rgba(255,220,50,.7);
  --hl-green:rgba(45,106,79,.18);--hl-green-b:rgba(45,106,79,.5);
  --code-bg:rgba(45,106,79,.1);--code-border:rgba(45,106,79,.25);
  --err-bg:rgba(184,92,56,.07);--err-border:rgba(184,92,56,.25);
  --badge-bg:rgba(184,92,56,.35);--badge-text:#8A4020;
  --toast-bg:#1E3A2F;--toast-text:#F5EDD4;
  --empty:#C4B49A;
  --hist-bg:rgba(254,250,242,.5);
  --scrollbar:#C4B49A;
  --intro-overlay:rgba(245,237,212,.98);
}

/* ── DARK THEME ── */
[data-theme="dark"]{
  --bg:#0F1A14;--bg2:#152019;--bg3:#0A1209;
  --border:#2A3D30;--border2:#1E2E25;
  --text:#E8DFC8;--text2:#B8A98A;--text3:#7A8A78;--text4:#4A5A48;
  --green-dark:#2D6A4F;--green-mid:#3D8A6A;--green-pale:#1E4030;
  --amber:#D4784A;--purple:#9B7EC7;--blue:#4A7AAC;
  --sidebar-bg:#0A1209;--sidebar-border:rgba(200,220,200,.06);
  --sidebar-text:#C8DACC;--sidebar-sub:rgba(200,220,200,.35);
  --sidebar-section:rgba(200,220,200,.22);
  --card-bg:#152019;--card-border:#1E2E25;
  --input-bg:#0F1A14;--input-border:#2A3D30;
  --header-bg:rgba(10,18,9,.96);--header-border:#1E2E25;
  --toolbar-bg:rgba(15,26,20,.9);
  --zone-bg:rgba(10,18,9,.6);
  --annot-bg:#0F1A14;
  --shadow:rgba(0,0,0,.3);--shadow2:rgba(0,0,0,.5);
  --hl-yellow:rgba(200,170,40,.3);--hl-yellow-h:rgba(200,170,40,.5);
  --hl-green:rgba(45,106,79,.3);--hl-green-b:rgba(45,106,79,.7);
  --code-bg:rgba(45,106,79,.15);--code-border:rgba(45,106,79,.35);
  --err-bg:rgba(184,92,56,.12);--err-border:rgba(184,92,56,.35);
  --badge-bg:rgba(212,120,74,.3);--badge-text:#E8C4A8;
  --toast-bg:#2D6A4F;--toast-text:#F0EDE0;
  --empty:#3A4A38;
  --hist-bg:rgba(21,32,25,.6);
  --scrollbar:#2A3D30;
  --intro-overlay:rgba(10,18,9,.98);
}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}

html,body{height:100%}
body{
  font-family:'Lora',serif;
  background:var(--bg);
  color:var(--text);
  -webkit-text-size-adjust:100%;
  transition:background .3s,color .3s;
}
em{font-family:'Cormorant Garamond',serif;font-style:italic;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* ════════ INICIO (estética original) ════════ */
.intro-box{
  max-width:640px;width:100%;text-align:center;margin:auto;padding:1.5rem 0 1rem;
  animation:introIn .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes introIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.intro-sigil{font-size:2.2rem;margin-bottom:.9rem;opacity:.7;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,5vw,2.5rem);font-weight:300;color:var(--text);letter-spacing:.04em;margin-bottom:.25rem;line-height:1.15;}
.intro-title em{color:var(--amber);font-style:italic;}
.intro-subtitle{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:1.5rem;}
.intro-divider{width:36px;height:1px;background:var(--border);margin:.7rem auto 1.1rem;}
.intro-desc{font-family:'Lora',serif;font-size:clamp(.82rem,2.2vw,.92rem);line-height:1.8;color:var(--text2);margin-bottom:1.4rem;text-align:left;max-width:500px;margin-left:auto;margin-right:auto;}
.intro-features{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:1.5rem;text-align:left;}
@media(max-width:480px){.intro-features{grid-template-columns:1fr;gap:.4rem;}}
.intro-feat{display:flex;align-items:flex-start;gap:.5rem;padding:.6rem .7rem;background:var(--card-bg);border:1px solid var(--border2);border-radius:6px;transition:border-color .15s,transform .15s,box-shadow .2s;cursor:pointer;text-align:left;width:100%;}
.intro-feat:hover{border-color:var(--green-mid);transform:translateY(-2px);box-shadow:0 4px 12px var(--shadow);}
.intro-feat-sym{font-size:.95rem;flex-shrink:0;margin-top:.05rem;}
.intro-feat-text{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.05em;color:var(--text2);line-height:1.55;}
.intro-feat-title{font-family:'Cormorant Garamond',serif;font-size:.86rem;font-weight:600;color:var(--text);display:block;margin-bottom:.08rem;}
.intro-aitag{font-family:'IBM Plex Mono',monospace;font-size:.42rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;background:rgba(45,106,79,.18);color:#5A9A7A;padding:.05rem .28rem;border-radius:2px;margin-left:.3rem;vertical-align:middle;}
.intro-note{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.08em;color:var(--text4);margin-top:.85rem;text-transform:uppercase;line-height:1.7;}

/* ════════ APP SHELL ════════ */
.app{display:flex;flex-direction:column;min-height:100vh;}
.hdr{
  position:sticky;top:0;z-index:80;
  display:flex;align-items:center;justify-content:space-between;gap:.75rem;
  padding:.6rem 1rem;background:var(--header-bg);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--header-border);
}
.hdr-left{display:flex;align-items:center;gap:.6rem;min-width:0;}
.hdr-home-btn{
  background:none;border:1px solid var(--border);color:var(--text2);
  width:34px;height:34px;border-radius:8px;font-size:1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.hdr-home-btn:hover{background:var(--bg3);color:var(--green-mid);border-color:var(--green-mid);}
.hdr-titles{min-width:0;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.hdr-status{display:none;align-items:center;gap:.4rem;font-size:.7rem;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
@media(min-width:760px){.hdr-status{display:flex;}}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);}
.save-pill{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.5px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3);white-space:nowrap;transition:.3s;}
.save-pill.saving{color:var(--amber);border-color:var(--amber);}
.save-pill.saved{color:var(--green-mid);border-color:var(--green-mid);}
.save-pill.dirty{color:var(--text3);}
.ai-toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer;padding:4px 8px;border-radius:20px;border:1px solid var(--border);user-select:none;}
.ai-toggle-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:1px;color:var(--text2);}
.ai-switch{width:30px;height:16px;border-radius:10px;background:var(--border);position:relative;transition:.2s;}
.ai-switch::after{content:"";position:absolute;width:12px;height:12px;border-radius:50%;background:var(--bg2);top:2px;left:2px;transition:.2s;}
.ai-switch.on{background:var(--green-mid);}
.ai-switch.on::after{left:16px;}
.theme-btn{background:none;border:1px solid var(--border);width:34px;height:34px;border-radius:8px;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:.15s;}
.theme-btn:hover{background:var(--bg3);}

.layout{display:flex;flex:1;min-height:0;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--sidebar-bg);
  padding:1rem .7rem;overflow-y:auto;position:sticky;top:53px;
  height:calc(100vh - 53px);
}
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.content-scroll{flex:1;overflow-y:auto;scroll-behavior:smooth;}

/* sidebar items */
.s-sec{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--sidebar-section);margin:1rem .5rem .4rem;}
.s-div{border:none;border-top:1px solid var(--sidebar-border);margin:.8rem .3rem;}
.s-btn{
  width:100%;display:flex;align-items:center;gap:.6rem;text-align:left;
  background:none;border:none;padding:.55rem .6rem;border-radius:8px;color:var(--sidebar-text);
  transition:background .15s;margin-bottom:1px;
}
.s-btn:hover{background:rgba(255,255,255,.05);}
.s-btn.active{background:rgba(255,255,255,.1);}
.s-btn.s-locked{opacity:.55;}
.s-sym{font-size:1.05rem;flex-shrink:0;width:20px;text-align:center;}
.s-texts{display:flex;flex-direction:column;min-width:0;flex:1;}
.s-name{font-size:.86rem;font-weight:500;display:flex;align-items:center;gap:.35rem;}
.s-sub{font-size:.66rem;color:var(--sidebar-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-aitag{font-family:'IBM Plex Mono',monospace;font-size:.52rem;background:rgba(45,106,79,.4);color:#A8D8BC;padding:0 4px;border-radius:3px;letter-spacing:.5px;}
.s-badge{background:var(--green-mid);color:#fff;font-size:.62rem;font-family:'IBM Plex Mono',monospace;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.s-lock{color:var(--sidebar-sub);font-size:.9rem;}
.s-footer{font-family:'IBM Plex Mono',monospace;font-size:.6rem;line-height:1.6;color:var(--sidebar-sub);text-align:center;margin-top:2rem;padding-top:1rem;border-top:1px solid var(--sidebar-border);}
.s-backup-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.6rem;padding:.7rem .6rem;border-radius:9px;border:1px solid rgba(245,237,212,.25);background:rgba(45,106,79,.28);color:var(--sidebar-text);font-weight:600;font-size:.82rem;transition:.15s;}
.s-backup-btn:hover{background:var(--green-mid);border-color:var(--green-mid);transform:translateY(-1px);}
.s-backup-sym{font-size:1rem;}

/* mobile sidebar → bottom bar */
@media(max-width:760px){
  .layout{flex-direction:column;}
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;height:auto;
    display:flex;overflow-x:auto;overflow-y:hidden;padding:.4rem .5rem;gap:.3rem;
    z-index:70;border-top:1px solid var(--sidebar-border);
  }
  .s-sec,.s-div,.s-footer{display:none;}
  .s-backup-btn{width:auto;min-width:56px;flex-direction:column;gap:.1rem;margin-top:0;padding:.4rem .5rem;}
  .s-backup-txt{font-size:.55rem;}
  .s-btn{flex-direction:column;width:auto;min-width:62px;gap:.15rem;padding:.4rem .5rem;text-align:center;}
  .s-sub{display:none;}
  .s-name{font-size:.62rem;flex-direction:column;}
  .s-badge{position:absolute;}
  .content-scroll{padding-bottom:70px;}
}

/* ════════ COMMON UI ════════ */
.wrap{max-width:1100px;margin:0 auto;padding:1.2rem 1.2rem 3rem;width:100%;}
.breadcrumbs{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;font-size:.74rem;color:var(--text3);font-family:'IBM Plex Mono',monospace;padding:.7rem 1.2rem .2rem;max-width:1100px;margin:0 auto;width:100%;}
.crumb{background:none;border:none;color:var(--text3);padding:0;font-size:.74rem;font-family:inherit;}
.crumb.link{color:var(--green-mid);cursor:pointer;}
.crumb.link:hover{text-decoration:underline;}
.crumb-sep{color:var(--text4);}
.crumb.current{color:var(--text2);}

.page-head{margin-bottom:1.2rem;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;display:flex;align-items:center;gap:.5rem;}
.page-sub{font-size:.86rem;color:var(--text2);margin-top:.25rem;line-height:1.5;max-width:680px;}

.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.05rem;border-radius:7px;font-size:.84rem;font-weight:500;border:1px solid transparent;transition:.15s;}
.btn.green{background:var(--green-dark);color:var(--sidebar-text);}
.btn.green:hover{background:var(--green-mid);}
.btn.outline{background:transparent;border-color:var(--border);color:var(--text2);}
.btn.outline:hover{border-color:var(--green-mid);color:var(--green-mid);}
.btn.amber{background:var(--amber);color:#fff;}
.btn.danger{background:transparent;border-color:var(--amber);color:var(--amber);}
.btn.danger:hover{background:var(--amber);color:#fff;}
.btn.sm{padding:.35rem .7rem;font-size:.76rem;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.tip{font-size:.76rem;color:var(--text3);font-style:italic;font-family:'Cormorant Garamond',serif;line-height:1.5;}
.tooltip-hint{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--text4);color:var(--text3);font-size:.6rem;cursor:help;margin-left:.3rem;}

.field-label{display:block;font-size:.74rem;font-weight:600;color:var(--text2);margin-bottom:.3rem;letter-spacing:.3px;}
.field-in,.field-ta,.field-sel{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:7px;padding:.6rem .7rem;font-size:.88rem;color:var(--text);transition:border .15s;
}
.field-ta{resize:vertical;min-height:80px;line-height:1.6;}
.field-in:focus,.field-ta:focus,.field-sel:focus{outline:none;border-color:var(--green-mid);}
.field-row{margin-bottom:.9rem;}
.field-2col{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
@media(max-width:620px){.field-2col{grid-template-columns:1fr;}}

.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:1rem;box-shadow:0 1px 3px var(--shadow);}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--empty);}
.empty-sigil{font-size:2rem;opacity:.4;margin-bottom:.5rem;}
.empty-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--text2);line-height:1.5;}

.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--toast-bg);color:var(--toast-text);padding:.7rem 1.3rem;border-radius:8px;
  font-size:.84rem;z-index:2000;box-shadow:0 6px 20px var(--shadow2);opacity:0;transition:.3s;pointer-events:none;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:760px){.toast{bottom:80px;}}

/* ════════ HOME DASHBOARD ════════ */
.home-hero{text-align:center;padding:1.5rem 0 1rem;}
.home-sigil{font-size:2rem;color:var(--green-mid);}
.home-title{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:600;margin-top:.3rem;}
.home-proj{font-size:.9rem;color:var(--text2);margin-top:.4rem;font-style:italic;font-family:'Cormorant Garamond',serif;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-top:1.6rem;}
.home-card{
  text-align:left;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;
  padding:1.1rem;transition:transform .15s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;gap:.4rem;
}
.home-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px var(--shadow);border-color:var(--green-mid);}
.home-card-sym{font-size:1.5rem;}
.home-card-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:.4rem;}
.home-card-desc{font-size:.78rem;color:var(--text2);line-height:1.5;}
.home-card-stat{font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:var(--text3);margin-top:.3rem;}
.home-section-label{font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:1.8rem 0 .2rem;}

/* ════════ SPLIT-SCREEN MODULE ════════ */
.split{display:flex;gap:0;height:calc(100vh - 53px);}
.split-left{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.split-right{width:420px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);}
@media(max-width:900px){
  .split{flex-direction:column;height:auto;}
  .split-left{border-right:none;border-bottom:1px solid var(--border);}
  .split-right{width:100%;}
}
.split-toolbar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.6rem .9rem;border-bottom:1px solid var(--border);background:var(--toolbar-bg);position:sticky;top:0;z-index:10;}
.split-doc-name{font-weight:600;font-size:.86rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.split-body{flex:1;overflow-y:auto;padding:1.4rem 1.6rem;}
.doc-text{font-size:1rem;line-height:1.9;color:var(--text);white-space:pre-wrap;word-wrap:break-word;font-family:'Lora',serif;text-align:justify;hyphens:auto;}
.doc-text mark{background:var(--hl-yellow);border-radius:2px;padding:0 1px;cursor:pointer;transition:background .15s;}
.doc-text mark:hover{background:var(--hl-yellow-h);}
.doc-text mark.coded{background:var(--hl-green);border-bottom:2px solid var(--hl-green-b);}
.doc-text mark.coded:hover{background:var(--hl-green-b);}
.doc-text mark.ai-suggest{background:transparent;border-bottom:2px dotted var(--purple);}
.doc-text mark.flash{animation:flashmark 1.6s ease;}
@keyframes flashmark{0%,40%{background:var(--amber);}100%{background:var(--hl-green);}}

/* contextual menu on text selection */
.ctx-menu{position:fixed;z-index:500;background:var(--card-bg);border:1px solid var(--border);border-radius:9px;box-shadow:0 8px 24px var(--shadow2);padding:.3rem;display:none;flex-direction:column;min-width:210px;}
.ctx-menu.show{display:flex;}
.ctx-item{display:flex;align-items:center;gap:.5rem;background:none;border:none;text-align:left;padding:.5rem .6rem;border-radius:6px;font-size:.8rem;color:var(--text);}
.ctx-item:hover{background:var(--bg3);}
.ctx-item .ci-sym{color:var(--green-mid);font-size:.9rem;width:16px;}

/* right panel tabs */
.tool-tabs{display:flex;flex-wrap:wrap;gap:.3rem;padding:.6rem .7rem;border-bottom:1px solid var(--border);background:var(--toolbar-bg);position:sticky;top:0;z-index:5;}

// ═══════════════════════════════════════════════════════════════════════════
// STORAGE — IndexedDB (kv para estado, files para blobs grandes)
// ═══════════════════════════════════════════════════════════════════════════
const DB_NAME = "cuaderno-etno";
const DB_VER = 1;
let _db = null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
      if(!db.objectStoreNames.contains("files")) db.createObjectStore("files");
    };
    req.onsuccess = ()=>{ _db = req.result; resolve(_db); };
    req.onerror = ()=>reject(req.error);
  });
}
function idbGet(store,key){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(store,"readonly").objectStore(store).get(key);
    tx.onsuccess=()=>resolve(tx.result); tx.onerror=()=>reject(tx.error);
  });
}
function idbSet(store,key,val){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(store,"readwrite").objectStore(store).put(val,key);
    tx.onsuccess=()=>resolve(true); tx.onerror=()=>reject(tx.error);
  });
}
function idbDel(store,key){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(store,"readwrite").objectStore(store).delete(key);
    tx.onsuccess=()=>resolve(true); tx.onerror=()=>reject(tx.error);
  });
}

// Claves de estado en kv
const KV = ["project","materials","folders","savedCodes","savedAnalyses","cats","aiOn","theme","apiKey","model","introSeen","history"];

async function loadState(){
  await openDB();
  // Migración desde localStorage (versión vieja) si IDB está vacío.
  const migrated = await idbGet("kv","_migrated");
  let migratedNow=false;
  if(!migrated){ await migrateFromLocalStorage(); migratedNow=true; }

  const g = async (k)=> await idbGet("kv",k);
  const p = await g("project"); if(p) project = {...project, ...p};
  // unificar campo viejo dentro de población (una sola vez)
  if(project.campo && project.campo.trim()){ project.poblacion=[project.campo,project.poblacion].filter(x=>x&&x.trim()).join(" · "); project.campo=""; }
  const m = await g("materials"); if(Array.isArray(m)) materials = m;
  const f = await g("folders"); if(Array.isArray(f)) folders = f;
  const sc = await g("savedCodes"); if(Array.isArray(sc)) savedCodes = sc;
  const sa = await g("savedAnalyses"); if(Array.isArray(sa)) savedAnalyses = sa;
  const rc = await g("recomendaciones"); if(Array.isArray(rc)) recomendaciones = rc;
  const dn = await g("deepNotes"); if(Array.isArray(dn)) deepNotes = dn;
  const ct = await g("cats"); if(ct) cats = ct;

async function migrateFromLocalStorage(){
  try{
    const L = (k)=>{ try{const r=localStorage.getItem(k); return r?JSON.parse(r):null;}catch{return null;} };
    const oldProj = L("etno-project");
    if(oldProj){
      // mapear campos viejos → nuevos (req 7)
      project.tema = oldProj.tema || "";
      project.objetivoGeneral = oldProj.objetivos || "";
      project.enfoque = oldProj.enfoque || "";
      project.campo = oldProj.campo || "";
      // 'preguntas' viejo se descarta como campo (req 7), pero lo preservamos en estado del arte por las dudas
      if(oldProj.preguntas) project.estadoArte = "";
    }
    const oldMats = L("etno-materials");
    if(Array.isArray(oldMats)) materials = oldMats.map(m=>({...m, folder:m.folder||null, anns:m.anns||[]}));
    const oldDocs = L("etno-docs");
    if((!oldMats||oldMats.length===0) && Array.isArray(oldDocs)){
      materials = oldDocs.map(d=>({id:d.id,type:"documentos",name:d.name,text:d.text,folder:null,date:new Date().toLocaleDateString("es-AR"),anns:[]}));
    }
    const oldNotes = L("etno-notes");
    if(Array.isArray(oldNotes)) oldNotes.forEach(n=>{ if(n.text) materials.push({id:n.id||("mat_"+Math.random().toString(36).slice(2)),type:"notas-campo",name:n.title||"Nota",text:n.text,folder:null,date:new Date().toLocaleDateString("es-AR"),anns:[]}); });
    const oldCats = L("etno-cats"); if(oldCats) cats = oldCats;
    const oldCodes = L("etno-saved-codes"); if(Array.isArray(oldCodes)) savedCodes = oldCodes.map(c=>({id:c.id,code:c.code,date:c.date||""}));
    const oldAna = L("etno-saved-analyses"); if(Array.isArray(oldAna)) savedAnalyses = oldAna;
    const oldKey = L("etno-api-key"); if(oldKey) await idbSet("kv","apiKey",oldKey);
    const oldModel = L("etno-model"); if(oldModel) await idbSet("kv","model",oldModel);
    // persistir lo migrado
    await idbSet("kv","project",project);
    await idbSet("kv","materials",materials);
    await idbSet("kv","savedCodes",savedCodes);
    await idbSet("kv","savedAnalyses",savedAnalyses);
    await idbSet("kv","cats",cats);
  }catch(e){ /* migración best-effort */ }
  await idbSet("kv","_migrated",true);
}

// MOTOR GEMINI (reutilizado, con créditos async)
// ═══════════════════════════════════════════════════════════════════════════
function diagnoseGeminiError(status, errorBody){
  const msg=(errorBody?.error?.message||"").toLowerCase();
  const code=errorBody?.error?.code||status;
  const errStatus=(errorBody?.error?.status||"").toUpperCase();
  if(!hasKey()) return {title:"⚠ Aún no configuraste tu clave de Gemini",detail:"Las funciones con IA están desactivadas. Andá a Configuración para activarlas: es gratis y toma 5 minutos.",action:"config"};
  if(status===0||status===undefined) return {title:"⚠ Sin conexión",detail:"No se pudo contactar con Google. Verificá tu conexión a internet y probá de nuevo.",action:"retry"};
  if(code===400 && msg.includes("api key not valid")) return {title:"⚠ La clave no es válida",detail:"Google no reconoce esa clave. Suele empezar con 'AIza' (~39 caracteres). Volvé a Configuración y pegала de nuevo.",action:"config"};
  if(code===400) return {title:"⚠ Solicitud incorrecta",detail:"Google rechazó la solicitud. Si era un archivo muy grande, probá uno más chico. Detalle: "+(errorBody?.error?.message||"—"),action:"retry"};
  if(code===401||code===403){
    if(msg.includes("region")||msg.includes("country")||msg.includes("location")) return {title:"⚠ Bloqueo geográfico",detail:"Google bloqueó la solicitud por la ubicación. Si tenés VPN activa, desactivala.",action:"config"};
    return {title:"⚠ Permiso denegado",detail:"Revisá que tu clave sea correcta y que aceptaste los términos en aistudio.google.com con la misma cuenta.",action:"config"};
  }
  if(code===429) return {title:"⚠ Llegaste al tope de consultas",detail:"Excediste el límite gratuito de Gemini para este modelo. Esperá un minuto. Si pasa seguido, cambiá a 'Flash-Lite' en Configuración (1.000/día).",action:"config"};
  if(code===413||msg.includes("too large")||msg.includes("size")) return {title:"⚠ Archivo demasiado grande",detail:"El contenido supera el límite de la API. Probá un archivo más liviano o partilo.",action:"retry"};
  if(code>=500) return {title:"⚠ Error del servidor de Google",detail:"Problema en los servidores de Google. Esperá unos minutos.",action:"retry"};
  return {title:"⚠ Error inesperado",detail:"Detalle: "+JSON.stringify(errorBody?.error||{status}),action:"retry"};
}
function buildGeminiBody(system,userContent,options={}){
  const userParts=(typeof userContent==="string")?[{text:userContent}]:userContent;
  const body={
    systemInstruction:{parts:[{text:system}]},
    contents:[{role:"user",parts:userParts}],
    generationConfig:{maxOutputTokens:options.maxTokens||4000,temperature:options.temperature??0.8,topP:0.95},
    safetySettings:[
      {category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_ONLY_HIGH"},
      {category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_ONLY_HIGH"},
      {category:"HARM_CATEGORY_SEXUALLY_EXPLICIT",threshold:"BLOCK_ONLY_HIGH"},
      {category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_ONLY_HIGH"}
    ]
  };
  // Grounding con Google Search (gratis hasta 500/día en modelos 2.5, sin tarjeta).
  if(options.grounding) body.tools=[{google_search:{}}];
  return body;
}
// Solo los modelos 2.5 tienen grounding gratis en el nivel sin facturación.
function groundingAvailable(){ return /2\.5/.test(getModel()); }
// Extrae las fuentes (enlaces) que devuelve el grounding.
function extractSources(meta){
  if(!meta) return [];
  const chunks=meta.groundingChunks||[];
  const out=[];
  chunks.forEach(ch=>{ const w=ch.web||ch.retrievedContext; if(w&&w.uri) out.push({title:w.title||w.uri,uri:w.uri}); });
  // dedupe por uri
  const seen=new Set();
  return out.filter(s=>{ if(seen.has(s.uri))return false; seen.add(s.uri); return true; });
}
let lastSources=[]; // fuentes del último llamado con grounding
async function streamGemini(system,userContent,onChunk,options={}){
  if(!hasKey()) throw {_diag:diagnoseGeminiError(undefined,{})};
  lastSources=[];
  const url=`${GEMINI_BASE}/${encodeURIComponent(getModel())}:streamGenerateContent?alt=sse&key=${encodeURIComponent(getKey())}`;
  let res;
  try{ res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(buildGeminiBody(system,userContent,options))}); }
  catch{ throw {_diag:diagnoseGeminiError(0,{})}; }
  if(!res.ok){ let b={}; try{b=await res.json();}catch{} throw {_diag:diagnoseGeminiError(res.status,b)}; }
  const reader=res.body.getReader(); const dec=new TextDecoder(); let buf="";
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n"); buf=lines.pop();
    for(const l of lines){
      const line=l.trim(); if(!line.startsWith("data:")) continue;
      const data=line.slice(5).trim(); if(!data||data==="[DONE]") continue;
      try{
        const p=JSON.parse(data);
        const fr=p.candidates?.[0]?.finishReason;
        if(fr==="SAFETY"||fr==="RECITATION") throw {_diag:{title:"⚠ Respuesta bloqueada por Google",detail:"Gemini bloqueó la respuesta (motivo: "+fr+"). Probá reformular o cambiar de modelo.",action:"retry"}};
        const src=extractSources(p.candidates?.[0]?.groundingMetadata); if(src.length) lastSources=src;
        const txt=p.candidates?.[0]?.content?.parts?.[0]?.text; if(txt) onChunk(txt);
      }catch(e){ if(e._diag) throw e; }
    }
  }
}
async function callGemini(system,userContent,options={}){
  if(!hasKey()) throw {_diag:diagnoseGeminiError(undefined,{})};
  lastSources=[];
  const url=`${GEMINI_BASE}/${encodeURIComponent(getModel())}:generateContent?key=${encodeURIComponent(getKey())}`;
  let res;
  try{ res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(buildGeminiBody(system,userContent,options))}); }
  catch{ throw {_diag:diagnoseGeminiError(0,{})}; }
  if(!res.ok){ let b={}; try{b=await res.json();}catch{} throw {_diag:diagnoseGeminiError(res.status,b)}; }
  const data=await res.json();
  const fr=data.candidates?.[0]?.finishReason;
  if(fr==="SAFETY"||fr==="RECITATION") throw {_diag:{title:"⚠ Respuesta bloqueada",detail:"Gemini bloqueó la respuesta (motivo: "+fr+").",action:"retry"}};
  lastSources=extractSources(data.candidates?.[0]?.groundingMetadata);
  return data.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
}
async function testGeminiConnection(){
  if(!hasKey()) return {ok:false,diag:diagnoseGeminiError(undefined,{})};
  try{ const out=await callGemini("Respondé en una sola palabra.","Decí únicamente: listo",{maxTokens:20,temperature:0.1}); return {ok:true,sample:out}; }
  catch(e){ return {ok:false,diag:e._diag||{title:"⚠ Falló el test",detail:String(e)}}; }
}

// ── Transcripción de audio vía Gemini (req 14) ──
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result.split(",")[1]);
    r.onerror=()=>reject(new Error("No se pudo leer el audio."));
    r.readAsDataURL(blob);
  });
}
async function transcribeAudio(blob, mime){
  if(!hasKey()) throw {_diag:diagnoseGeminiError(undefined,{})};
  if(blob.size > 18*1024*1024) throw new Error("El audio supera ~18 MB (límite para transcripción directa). Recortalo o convertilo a un formato más comprimido (mp3/ogg).");
  const b64=await blobToBase64(blob);
  const parts=[
    {inlineData:{mimeType:mime||blob.type||"audio/mpeg", data:b64}},
    {text:"Transcribí este audio al español en texto corrido y fiel. No agregues comentarios, títulos ni resúmenes: solo la transcripción. Si hay varios hablantes y se distinguen, marcalos como «—»."}
  ];
  return await callGemini("Sos un transcriptor preciso. Devolvés solo la transcripción del audio, sin agregados.", parts, {maxTokens:4000,temperature:0.1});
}

function renderMd(text){
  const ri=t=>t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>").replace(/`(.*?)`/g,'<code>$1</code>');
  let html="";
  (text||"").split("\n").forEach((line)=>{
    const tr=line.trim();
    if(/^#{1,4}\s/.test(tr)) html+=`<div class="md-sec">${esc(tr.replace(/^#{1,4}\s/,""))}</div>`;
    else if(/^\*\*[^*]+\*\*:?$/.test(tr)) html+=`<div class="md-sec">${esc(tr.replace(/\*\*/g,"").replace(/:$/,""))}</div>`;
    else if(/^[-•*]\s/.test(tr)) html+=`<div class="md-bul"><span class="md-dot">◦</span><span>${ri(esc(tr.replace(/^[-•*]\s/,"")))}</span></div>`;
    else if(tr==="") html+=`<div style="height:.5em"></div>`;
    else html+=`<p style="margin:0 0 .35em">${ri(esc(tr))}</p>`;
  });
  return html;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function uid(p){return (p||"id")+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"2-digit"});}

async function extractPdfText(file){
  if(!window.pdfjsLib) throw new Error("pdf.js no cargó. Revisá tu conexión y recargá.");
  if(file.size>50*1024*1024) throw new Error("El PDF pesa más de 50 MB. Probá uno más liviano.");
  const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let full="",nonEmpty=0;
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i); const content=await page.getTextContent();
    const t=content.items.map(it=>it.str).join(" ").replace(/\s+/g," ").trim();
    if(t.length>10) nonEmpty++;
    full+=t+"\n\n";
    if(pdf.numPages>5 && i%5===0) showToast(`Extrayendo página ${i}/${pdf.numPages}…`);
  }
  full=full.replace(/\n{3,}/g,"\n\n").trim();
  if(nonEmpty===0) throw new Error("No se encontró texto: parece un PDF escaneado (imágenes). pdf.js no puede leerlo.");
  return full;
}
async function extractDocxText(file){
  if(!window.mammoth) throw new Error("mammoth.js no cargó. Revisá tu conexión y recargá.");
  const r=await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  const t=(r.value||"").replace(/\n{3,}/g,"\n\n").trim();
  if(!t) throw new Error("No se encontró texto en este .docx.");
  return t;
}
async function readFileText(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){ showToast("Extrayendo PDF localmente…"); return await extractPdfText(file); }
  if(ext==="docx"){ showToast("Extrayendo .docx localmente…"); return await extractDocxText(file); }
  if(["txt","md","csv"].includes(ext)) return await file.text();
  if(ext==="doc") throw new Error("Los .doc antiguos no se leen en el navegador. Guardalo como .docx o .txt.");
  throw new Error(`Formato no soportado: .${ext}`);
}
async function handleFileUpload(files, type, folder){
  for(const file of files){
    try{
      const text=await readFileText(file);
      if(!text||!text.trim()){ showToast("No se pudo extraer texto de "+file.name); continue; }
      materials.push({id:uid("mat"),type,name:file.name,text,folder:folder||null,date:today(),anns:[]});
      markDirty(); showToast(`“${file.name}” cargado ✓`);
    }catch(e){ showToast(e.message||"Error al procesar "+file.name); }
  }
  await persist(); render();
}

let _mediaRec=null,_recChunks=[],_recType=null,_recFolder=null;
function audioWarnAndTranscribe(blob, mime, type, folder, suggestedName){
  openModal(`
    <div class="modal-head"><div class="modal-title">Transcribir audio</div><button class="modal-close" id="m-close">✕</button></div>
    <div class="modal-body">

      <div class="field-row"><label class="field-label">Nombre del material</label><input class="field-in" id="aud-name" value="${esc(suggestedName||"Audio "+today())}"/></div>
      <div class="tip">Tamaño del audio: ${(blob.size/1024/1024).toFixed(2)} MB · Después vas a poder corregir la transcripción a mano.</div>
    </div>
    <div class="modal-foot"><button class="btn outline" id="m-cancel">Cancelar</button><button class="btn green" id="m-go">Transcribir con Gemini</button></div>`);
  document.getElementById("m-close").onclick=closeModal;
  document.getElementById("m-cancel").onclick=closeModal;
  document.getElementById("m-go").onclick=async()=>{
    const name=val("aud-name")||"Audio";
    const btn=document.getElementById("m-go"); btn.disabled=true; btn.innerHTML='<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span> Transcribiendo…';
    try{
      const txt=await transcribeAudio(blob, mime);
      materials.push({id:uid("mat"),type,name,text:txt,folder:folder||null,date:today(),anns:[],fromAudio:true});
      markDirty(); await persist(); closeModal(); showToast("Transcripción lista · revisala y corregí ✓"); render();
    }catch(e){
      const d=e._diag; closeModal();
      openModal(`<div class="modal-head"><div class="modal-title">No se pudo transcribir</div><button class="modal-close" id="m-close">✕</button></div>
        <div class="modal-body"><div class="err-detail"><div class="err-detail-title">${esc(d?.title||"⚠ Error")}</div><div class="err-detail-body">${esc(d?.detail||e.message||String(e))}</div></div></div>
        <div class="modal-foot"><button class="btn green" id="m-ok">Entendido</button></div>`);
      document.getElementById("m-close").onclick=closeModal; document.getElementById("m-ok").onclick=closeModal;
    }
  };
}
async function startRecording(type,folder){
  if(!navigator.mediaDevices?.getUserMedia){ showToast("Tu navegador no permite grabar audio."); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    _recChunks=[]; _recType=type; _recFolder=folder;
    _mediaRec=new MediaRecorder(stream);
    _mediaRec.ondataavailable=e=>{ if(e.data.size) _recChunks.push(e.data); };
    _mediaRec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(_recChunks,{type:_mediaRec.mimeType||"audio/webm"});
      audioWarnAndTranscribe(blob, blob.type, _recType, _recFolder, "Grabación "+today());
    };
    _mediaRec.start(); renderMaterialsView(type);
  }catch(e){ showToast("No se pudo acceder al micrófono."); }
}
function stopRecording(){ if(_mediaRec&&_mediaRec.state!=="inactive") _mediaRec.stop(); _mediaRec=null; }

  let segs=(m.anns||[]).filter(a=>a.start>=0&&a.end>a.start&&a.end<=text.length)
    .map(a=>({start:a.start,end:a.end,ann:a}))
    .sort((x,y)=>x.start-y.start);
  // descartar solapadas
  const clean=[]; let lastEnd=-1;
  for(const s of segs){ if(s.start>=lastEnd){ clean.push(s); lastEnd=s.end; } }
  // marcas IA que no solapen con anotaciones reales
  const aiSegs=workAiMarks.filter(mk=>!clean.some(s=>mk.start<s.end&&mk.end>s.start))
    .map(mk=>({start:mk.start,end:mk.end,ai:true,term:mk.term})).sort((x,y)=>x.start-y.start);
  // fusionar todo y reordenar evitando solapes entre IA
  let all=[...clean]; let aiLast=-1;
  for(const a of aiSegs){ if(a.start>=aiLast && !all.some(s=>a.start<s.end&&a.end>s.start)){ all.push(a); aiLast=a.end; } }
  all.sort((x,y)=>x.start-y.start);
  let html="",cur=0;
  for(const s of all){
    if(s.start<cur) continue;
    html+=esc(text.slice(cur,s.start));
    const frag=esc(text.slice(s.start,s.end));
    if(s.ai){ html+=`<mark class="ai-suggest" data-ai="1" data-term="${esc(s.term)}" data-s="${s.start}" data-e="${s.end}">${frag}</mark>`; }
    else { const a=s.ann; const cls=a.kind==="highlight"?"":"coded"; html+=`<mark class="${cls}" data-ann="${a.id}">${frag}</mark>`; }
    cur=s.end;
  }
  html+=esc(text.slice(cur));
  return html;
}
// offsets de la selección relativos al texto crudo del material
function getSelOffsets(container){
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed) return null;
  const range=sel.getRangeAt(0);
  if(!container.contains(range.startContainer)||!container.contains(range.endContainer)) return null;
  const pre=document.createRange(); pre.selectNodeContents(container); pre.setEnd(range.startContainer,range.startOffset);
  const start=pre.toString().length; const quote=range.toString(); const end=start+quote.length;
  if(!quote.trim()) return null;
  return {start,end,quote};
}
// busca ocurrencias de un término en el texto → marcas
function termOccurrences(text,term,max){
  const out=[]; if(!term||term.length<3) return out;
  const lc=text.toLowerCase(), q=term.toLowerCase(); let i=0,n=0;
  while((i=lc.indexOf(q,i))!==-1 && n<(max||3)){ out.push({term,start:i,end:i+term.length}); i+=term.length; n++; }
  return out;
}

function ctxAction(act,mode){
  if(!pendingSel) return;
  const m=activeMat(); if(!m) return;
  if(act==="hl"){
    m.anns.push({id:uid("ann"),kind:"highlight",quote:pendingSel.quote,start:pendingSel.start,end:pendingSel.end,date:today()});
    markDirty(); persist(); pendingSel=null; renderWorkView(mode); return;
  }
  // Guardar como código/análisis → automático, tal cual (nombre = el fragmento, abreviado)
  if(act==="save"){
    const auto=pendingSel.quote.trim().replace(/\s+/g," ");
    const name=auto.length>48?auto.slice(0,48)+"…":auto;
    attachCode(m,name,pendingSel,mode); return;
  }
  // Escribir código/análisis vinculado → casilla para nombrar uno nuevo
  if(act==="writenew"){ promptCodeName(mode,(name)=>{ attachCode(m,name,pendingSel,mode); }); return; }
  // Vincular a preexistente
  if(act==="link"){ pickExistingCode((code)=>{ attachCode(m,code.code,pendingSel,mode,code.id); }); return; }
}
function attachCode(m,name,sel,mode,existingId){
  let code=findCode(existingId||name);
  if(!code){ code={id:uid("cod"),code:name,date:today()}; savedCodes.push(code); }
  const kindLabel = mode==="codificar"?"código":"análisis";
  m.anns.push({id:uid("ann"),kind:"code",codeId:code.id,label:code.code,quote:sel.quote,start:sel.start,end:sel.end,annMode:mode,date:today()});
  markDirty(); persist(); pendingSel=null; showToast(`${kindLabel.charAt(0).toUpperCase()+kindLabel.slice(1)} “${code.code.length>24?code.code.slice(0,24)+"…":code.code}” aplicado ✓`); renderWorkView(mode);
}
function promptCodeName(mode,cb){
  const suggs=savedCodes.slice(0,12);
  openModal(`<div class="modal-head"><div class="modal-title">Guardar como código</div><button class="modal-close" id="m-close">✕</button></div>
    <div class="modal-body">

    </div>

  setTimeout(()=>document.getElementById("code-name")?.focus(),50);
}
function pickExistingCode(cb){
  if(!savedCodes.length){ showToast("Todavía no hay códigos. Creá uno con «Guardar como código»."); return; }
  openModal(`<div class="modal-head"><div class="modal-title">Vincular a código existente</div><button class="modal-close" id="m-close">✕</button></div>

function resetWorkAi(){ workAiOut=""; workAiCodes=[]; workAiKind=""; workAiMarks=[]; focusedAnn=null; workLinkedMats=[]; }
async function handleWorkUpload(files,mode){
  let firstId=null;
  for(const file of files){
    try{
      const text=await readFileText(file);
      if(!text||!text.trim()){ showToast("No se pudo extraer texto de "+file.name); continue; }
      const mat={id:uid("mat"),type:"notas-campo",name:file.name,text,folder:null,date:today(),anns:[]};
      materials.push(mat); if(!firstId) firstId=mat.id;
      showToast(`“${file.name}” cargado ✓`);
    }catch(e){ showToast(e.message||"Error al procesar "+file.name); }
  }
  await persist();
  if(firstId){ activeMatId=firstId; resetWorkAi(); }
  renderWorkView(mode);
}

async function runWorkAI(mode,m){
  if(!aiEnabled()){ showToast("Activá la IA para generar sugerencias."); return; }
  workAiLoading=true; workAiOut=""; workAiCodes=[];
  refreshPanel(mode,m);
  const enf = ENFOQUES[mode].find(e=>e.key===workEnfoque);
  const enfTxt = enf ? `\nEnfocate especialmente en esta dimensión: «${enf.t}».` : "";
  const frag = pendingSel ? `\n\nFragmento que está mirando ahora (centrate en él):\n"${pendingSel.quote}"` : "";
  let task="", label="";
  if(mode==="codificar" && workTab==="codigos"){ workAiKind="codigos"; label="codigos";
    task=`Proponé códigos analíticos para este material. Devolvé una lista breve (viñetas «- »), cada código una palabra o frase corta, pertinente al marco del proyecto. No repitas los códigos ya creados.`;
  } else if(mode==="codificar"){ workAiKind="preguntas"; label="preguntas";
    task=`Ayudá a pensar la codificación: proponé interrogantes y posibles entradas analíticas para este material, en viñetas breves.`;
  } else if(mode==="analizar" && workTab==="escribir"){ workAiKind="analisis"; label="analisis";
    task=`Acompañá el análisis de este material con aperturas (no reemplaces la escritura de quien investiga): observaciones, tensiones y preguntas, en prosa breve y viñetas.`;
  } else if(mode==="analizar" && workTab==="biblio"){ workAiKind="biblio"; label="biblio";
    task=`Relacioná este material con la bibliografía vinculada: qué conceptos o discusiones de esos textos iluminan el material, y dónde hay tensión. Citá de qué texto sale cada idea.`;
  } else { workAiKind="fuentes"; label="fuentes";
    task=`Relacioná este material con las otras fuentes vinculadas (entrevistas/notas): resonancias, contrastes y patrones compartidos, retomando sus códigos y análisis si ayudan.`;
  }
  const system = `Sos un colega de investigación cualitativa acompañando ${mode==="codificar"?"la codificación":"el análisis"} etnográfico. ${NO_FILLER}${enfTxt}${projectContext()}${priorWorkContext()}${linkedMaterialsContext()}`;
  const userText = `${task}${frag}\n\nMaterial (${m.name}):\n\n${(m.text||"").slice(0,9000)}`;
  try{
    let acc="";
    await streamGemini(system,userText,(ch)=>{ acc+=ch; workAiOut=acc; const box=document.querySelector(".ai-out"); if(box) box.innerHTML=renderMd(acc)+'<span class="cursor-blink"></span>'; },{maxTokens:3200,temperature:0.8});
    workAiOut=acc;
    if(workAiKind==="codigos"){
      workAiCodes=acc.split("\n").filter(l=>/^\s*[-•*]/.test(l)).map(l=>l.replace(/^\s*[-•*]\s*/,"").replace(/\*\*/g,"").replace(/[:：].*$/,"").trim()).filter(x=>x&&x.length<60);
      workAiCodes=[...new Set(workAiCodes)].slice(0,10);
    }
    history=[{mode,label,date:today(),input:m.name,output:acc},...history].slice(0,12); persist();
  }catch(e){ const d=e._diag||{title:"⚠ Error",detail:String(e)}; workAiOut=""; showToast(d.title); }
  workAiLoading=false; refreshPanel(mode,m);
}

function parseAiSections(text,SECTIONS){
  const res={};
  const norm=s=>String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"").trim();
  const lines=text.split("\n"); let curKey=null,buf=[];
  const titleToKey=t=>{ const up=norm(t); const s=SECTIONS.find(x=>up.includes(norm(x.title))||norm(x.title).includes(up)); return s?s.key:null; };
  const flush=()=>{ if(curKey) res[curKey]=buf.join("\n").trim(); buf=[]; };
  for(const l of lines){
    const hm=l.match(/^#{1,4}\s*(.+)$/) || l.match(/^\*\*(.+?)\*\*:?\s*$/);
    if(hm){ const k=titleToKey(hm[1]); if(k){ flush(); curKey=k; continue; } }
    if(curKey) buf.push(l);
  }
  flush();
  return res;
}

      const scale=1+(freq/maxF)*0.6;
      return `<div class="concept-node" data-id="${c.id}" style="border-left-width:${2+Math.round((freq/maxF)*6)}px">
        <div class="concept-node-name" style="font-size:${(0.96*scale).toFixed(2)}rem">${esc(c.code)}</div>
        <div class="concept-node-meta"><span class="concept-node-freq">${freq}</span><span>${origins.length} origen${origins.length!==1?"es":""}</span></div>
        ${origins.length?`<div class="concept-node-origins">${origins.slice(0,3).map(esc).join(" · ")}${origins.length>3?` +${origins.length-3}`:""}</div>`:'<div class="concept-node-origins" style="opacity:.6">sin fragmentos aún</div>'}
      </div>`;
    }).join("")}</div>`;
  }
  // co-ocurrencias
  const codeMats={}; allCodeAnns().forEach(o=>{ (codeMats[o.ann.codeId]=codeMats[o.ann.codeId]||new Set()).add(o.mat.id); });
  const ids=Object.keys(codeMats); const pairs=[];
  for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++){ const shared=[...codeMats[ids[i]]].filter(x=>codeMats[ids[j]].has(x)); if(shared.length) pairs.push({a:ids[i],b:ids[j],n:shared.length}); }
  pairs.sort((x,y)=>y.n-x.n);
  const nm=id=>{const c=findCode(id);return c?c.code:"?";};
  const links = pairs.length?`<div class="home-section-label">Códigos que coinciden en los mismos materiales</div>
    <div class="card">${pairs.slice(0,30).map(p=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px dashed var(--border)">
      <span class="usercode-chip">${esc(nm(p.a))}</span><span class="crumb-sep">—</span><span class="usercode-chip">${esc(nm(p.b))}</span>
      <span class="mat-meta" style="margin-left:auto">${p.n} en común</span></div>`).join("")}</div>`:"";
  return `<div class="tip" style="margin-bottom:.8rem">Mapa de tus códigos: tamaño y borde según frecuencia. Tocá uno para ver todos sus fragmentos.</div>${map}${links}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// CITAR — APA 7 y Chicago 17 (sin IA) — lógica reutilizada
// ═══════════════════════════════════════════════════════════════════════════
function parseAutores(raw){
  if(!raw.trim()) return [];
  const parts=(raw.includes(";")||raw.includes("\n"))?raw.split(/[;\n]/).map(s=>s.trim()).filter(Boolean):[raw.trim()];
  return parts.map(p=>{
    if(p.includes(",")){ const [ap,...rest]=p.split(","); return {apellido:ap.trim(),nombre:rest.join(",").trim()}; }
    const tk=p.trim().split(/\s+/);
    if(tk.length===1) return {apellido:tk[0],nombre:""};
    return {apellido:tk[tk.length-1],nombre:tk.slice(0,-1).join(" ")};
  });
}
function inicial(n){ return n?n.split(/\s+/).map(x=>x[0]?.toUpperCase()+".").join(" "):""; }
function formatAutoresAPA(a){
  if(a.length===0) return "[Autor desconocido]";
  if(a.length===1) return `${a[0].apellido}, ${inicial(a[0].nombre)}`;
  if(a.length===2) return `${a[0].apellido}, ${inicial(a[0].nombre)}, & ${a[1].apellido}, ${inicial(a[1].nombre)}`;
  if(a.length<=20){ const i=a.slice(0,-1).map(x=>`${x.apellido}, ${inicial(x.nombre)}`).join(", "); return `${i}, & ${a.slice(-1)[0].apellido}, ${inicial(a.slice(-1)[0].nombre)}`; }
  return a.slice(0,19).map(x=>`${x.apellido}, ${inicial(x.nombre)}`).join(", ")+", ... "+a.slice(-1)[0].apellido+", "+inicial(a.slice(-1)[0].nombre);
}
function formatAutoresChicago(a){
  if(a.length===0) return "[Autor desconocido]";
  if(a.length===1) return `${a[0].apellido}, ${a[0].nombre}`;
  const first=`${a[0].apellido}, ${a[0].nombre}`; const rest=a.slice(1).map(x=>`${x.nombre} ${x.apellido}`.trim());
  if(a.length===2) return `${first} y ${rest[0]}`;
  return `${first}, ${rest.slice(0,-1).join(", ")} y ${rest.slice(-1)[0]}`;
}
function citaTextoAPA(a,an){ if(a.length===0)return `([s.a.], ${an||"s.f."})`; if(a.length===1)return `(${a[0].apellido}, ${an||"s.f."})`; if(a.length===2)return `(${a[0].apellido} & ${a[1].apellido}, ${an||"s.f."})`; return `(${a[0].apellido} et al., ${an||"s.f."})`; }
function citaTextoChicago(a,an){ if(a.length===0)return `([s.a.] ${an||"s.f."})`; if(a.length===1)return `(${a[0].apellido} ${an||"s.f."})`; if(a.length===2)return `(${a[0].apellido} y ${a[1].apellido} ${an||"s.f."})`; return `(${a[0].apellido} et al. ${an||"s.f."})`; }
function generarCita(){
  const s=citarState; const autores=parseAutores(s.autores); const anioStr=s.anio||"s.f.";
  let apa="",chiAuFe="",chiNota=""; const tituloFull=s.titulo+(s.subtitulo?`: ${s.subtitulo}`:"");
  const nombres=autores.map(a=>`${a.nombre} ${a.apellido}`.trim()).join(", ")||"[Autor desconocido]";
  if(s.tipo==="libro"){
    apa=`${formatAutoresAPA(autores)} (${anioStr}). *${tituloFull}*${s.edicion?` (${s.edicion} ed.)`:""}. ${s.editorial||"[Editorial]"}.${s.doi?` https://doi.org/${s.doi.replace(/^https?:\/\/doi\.org\//,"")}`:""}`;
    chiAuFe=`${formatAutoresChicago(autores)}. ${anioStr}. *${tituloFull}*. ${s.lugar?s.lugar+": ":""}${s.editorial||"[Editorial]"}.`;
    chiNota=`${nombres}, *${tituloFull}* (${s.lugar?s.lugar+": ":""}${s.editorial||"[Editorial]"}, ${anioStr})${s.paginas?`, ${s.paginas}`:""}.`;
  } else if(s.tipo==="capitulo"){
    apa=`${formatAutoresAPA(autores)} (${anioStr}). ${tituloFull}. En ${s.capEditores||"[Editores]"} (Eds.), *${s.capLibro||"[Título del libro]"}* (pp. ${s.paginas||"[pp.]"}). ${s.editorial||"[Editorial]"}.`;
    chiAuFe=`${formatAutoresChicago(autores)}. ${anioStr}. "${tituloFull}". En *${s.capLibro||"[Título del libro]"}*, editado por ${s.capEditores||"[Editores]"}, ${s.paginas||"[pp.]"}. ${s.lugar?s.lugar+": ":""}${s.editorial||"[Editorial]"}.`;
    chiNota=`${nombres}, "${tituloFull}", en *${s.capLibro||"[Título del libro]"}*, ed. ${s.capEditores||"[Editores]"} (${s.lugar?s.lugar+": ":""}${s.editorial||"[Editorial]"}, ${anioStr}), ${s.paginas||"[pp.]"}.`;
  } else if(s.tipo==="articulo"){
    apa=`${formatAutoresAPA(autores)} (${anioStr}). ${tituloFull}. *${s.revista||"[Revista]"}*, ${s.volumen||"[vol.]"}${s.numero?`(${s.numero})`:""}, ${s.paginas||"[pp.]"}.${s.doi?` https://doi.org/${s.doi.replace(/^https?:\/\/doi\.org\//,"")}`:""}`;
    chiAuFe=`${formatAutoresChicago(autores)}. ${anioStr}. "${tituloFull}". *${s.revista||"[Revista]"}* ${s.volumen||"[vol.]"}${s.numero?`, no. ${s.numero}`:""}: ${s.paginas||"[pp.]"}.${s.doi?` https://doi.org/${s.doi.replace(/^https?:\/\/doi\.org\//,"")}.`:""}`;
    chiNota=`${nombres}, "${tituloFull}", *${s.revista||"[Revista]"}* ${s.volumen||"[vol.]"}${s.numero?`, no. ${s.numero}`:""} (${anioStr}): ${s.paginas||"[pp.]"}.`;
  } else if(s.tipo==="tesis"){
    const nl=s.nivelTesis==="doctoral"?"Tesis doctoral":"Tesis de maestría";
    apa=`${formatAutoresAPA(autores)} (${anioStr}). *${tituloFull}* [${nl}, ${s.universidad||"[Universidad]"}].`;
    chiAuFe=`${formatAutoresChicago(autores)}. ${anioStr}. "${tituloFull}". ${nl}, ${s.universidad||"[Universidad]"}.`;
    chiNota=`${nombres}, "${tituloFull}" (${nl}, ${s.universidad||"[Universidad]"}, ${anioStr}).`;
  } else if(s.tipo==="web"){
    apa=`${formatAutoresAPA(autores)} (${anioStr}). ${tituloFull}. *${s.sitio||"[Sitio web]"}*. ${s.url||"[URL]"}`;
    chiAuFe=`${formatAutoresChicago(autores)}. ${anioStr}. "${tituloFull}". *${s.sitio||"[Sitio web]"}*. ${s.fechaAcceso?`Consultado el ${s.fechaAcceso}. `:""}${s.url||"[URL]"}.`;

async function runCitarAI(){
  const q=(document.getElementById("cita-ai-q")?.value||"").trim();
  if(!q){ showToast("Pegá lo que sepas del texto"); return; }
  const st=document.getElementById("cita-ai-status"); if(st) st.textContent="Buscando…";
  const useGround=citarGrounding && groundingAvailable();
  const sys=`Sos un asistente bibliográfico. ${useGround?"Usá búsqueda en Google para encontrar los datos reales de la referencia.":""} Devolvé EXCLUSIVAMENTE un objeto JSON válido (sin texto antes ni después, sin backticks) con estas claves (string; vacías si no las encontrás): tipo (uno de: libro, capitulo, articulo, tesis, web, informe), autores (formato "Apellido, Nombre; Apellido, Nombre"), anio, titulo, subtitulo, editorial, lugar, edicion, revista, volumen, numero, paginas, doi, url, sitio, capLibro, capEditores, universidad.`;
  try{
    let out=await callGemini(sys,q,{maxTokens:700,temperature:0.1,grounding:useGround});
    out=out.replace(/```json|```/g,"").trim();
    const m=out.match(/\{[\s\S]*\}/); if(m) out=m[0];
    const data=JSON.parse(out);
    Object.keys(citarState).forEach(k=>{ if(data[k]!==undefined && data[k]!=="") citarState[k]=data[k]; });
    if(data.tipo && CITA_TIPOS.some(t=>t[0]===data.tipo)) citarState.tipo=data.tipo;
    showToast("Datos completados · revisalos ✓");
    render();
    if(lastSources&&lastSources.length){ const st2=document.getElementById("cita-ai-status"); if(st2) st2.innerHTML="Fuentes: "+lastSources.map(s=>`<a href="${esc(s.uri)}" target="_blank" rel="noopener" style="color:var(--green-mid)">${esc(s.title.slice(0,30))}</a>`).join(" · "); }
  }catch(e){
    const st3=document.getElementById("cita-ai-status"); if(st3) st3.textContent="No se pudo completar automáticamente. Probá con más datos o cargalos a mano.";
  }
}

const RECOMENDAR_SYSTEM = `Sos un/a guía bibliográfico/a crítico/a para ciencias sociales, antropología y estudios culturales. Tu tarea es recomendar bibliografía de calidad real —no popularidad— sobre la temática planteada.

CRITERIOS DE SELECCIÓN (aplicalos siempre, sin excepción):
- Relevancia conceptual y rigor metodológico por encima del índice de citas o la fama del nombre.
- Equilibrio geográfico activo: Norte Global (Europa, EEUU, Canadá, Australia) y Sur Global (América Latina, África, Asia, Medio Oriente, Oceanía indígena) tienen igual peso. No completar secciones "del sur" como anexo: integrá las voces de forma transversal.
- Equilibrio de género: incluí autoras, investigadoras no-binarias y colectivos de escritura mixta en todas las secciones, no solo en una sección específica.
- Diversidad lingüística: buscá obras en español, portugués, inglés, francés, alemán, italiano, árabe, swahili, hindi, lenguas indígenas con escritura y otras lenguas relevantes para la temática. Indicá el idioma original cuando no sea español o cuando esté disponible en más de un idioma. Nunca limitarte a la producción angloparlante.
- Incluí textos inéditos, tesis doctorales, informes de investigación, publicaciones en revistas regionales y producción colectiva o activista cuando sean pertinentes.
- Si una obra clásica tiene sesgos importantes (coloniales, androcéntricos, etc.), nómbralos brevemente junto con la recomendación.

**OBRAS FUNDAMENTALES**
3-4 textos de referencia ineludibles para el tema. Para cada uno/a: autor/a (con pronombres si los usa públicamente o son relevantes), año, título, idioma original, por qué es clave, una advertencia si aplica.

**PERSPECTIVAS DEL SUR GLOBAL**
3-4 aportes desde América Latina, África, Asia u Oceanía —no como "voces locales" sino como teoría de alcance general. Incluí tanto producción en español/portugués como en otras lenguas.

**APORTES FEMINISTAS, DECOLONIALES Y DISIDENTES**
3-4 obras que desafíen los marcos dominantes del campo desde el género, la decolonialidad, la disidencia epistémica o la interseccionalidad. Pueden solaparse con otras secciones.

**DIÁLOGOS CONTEMPORÁNEOS**
3 debates o conversaciones actuales en el campo (post-2010), con al menos una obra no publicada en inglés o en una editorial del Norte Global.

**CONCEPTOS CLAVE COMO HERRAMIENTAS**
4-6 nociones operativas para trabajar el tema, con el/la autor/a que las acuñó o reformuló de forma más productiva —que no siempre es quien más se cita.

**PUNTO DE ENTRADA**
Una sola obra, accesible y representativa, para quien no conoce el campo. Justificá la elección.

ADVERTENCIA IMPORTANTE: como modelo de lenguaje podés equivocarte en datos bibliográficos (años, editoriales, títulos exactos). Indicá al final que conviene verificar cada referencia en catálogos o bases reales antes de citarla.

Usá un tono de colega que comparte lecturas, no de enciclopedia. Podés señalar tensiones entre autores/as.`;

async function runRecomendar(){

  try{
    let acc="";
    await streamGemini(system,q,(ch)=>{ acc+=ch; recOut=acc; const o=document.getElementById("rec-out"); if(o){o.innerHTML=renderMd(acc)+'<span class="cursor-blink"></span>';} },{maxTokens:3800,temperature:0.85,grounding:useGround});

  recLoading=false; renderRecomendarView();
}

function exportAll(){
  const data={_app:"faro",_v:10,date:new Date().toISOString(),project,materials,folders,savedCodes,savedAnalyses,cats};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`faro-${today().replace(/\//g,"-")}.json`; a.click();
  showToast("Respaldo exportado ✓");
}
function importAll(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      confirmModal("¿Importar respaldo?","Esto reemplaza tu proyecto, materiales, códigos y análisis actuales por los del archivo. Exportá un respaldo antes si tenés dudas.",async()=>{
        project=d.project||project; materials=d.materials||[]; folders=d.folders||[]; savedCodes=d.savedCodes||[]; savedAnalyses=d.savedAnalyses||[]; cats=d.cats||{};
        await persist(); showToast("Respaldo importado ✓"); go("home");
      });
    }catch{ showToast("El archivo no es un respaldo válido."); }
  };
  r.readAsText(f);
}
function wipeAll(){
  confirmModal("¿Seguro que querés borrar TODO?","Primer aviso: esto elimina permanentemente todos tus datos de este navegador.",()=>{
    confirmModal("Confirmación final","Segundo y último aviso: no hay vuelta atrás. ¿Borrar todo ahora?",async()=>{
      project={tema:"",objetivoGeneral:"",objetivosEspecificos:"",enfoque:"",campo:"",poblacion:"",estadoArte:"",metodologia:""};
      materials=[]; folders=[]; savedCodes=[]; savedAnalyses=[]; cats={}; history=[];
      await persist(); await setKey(""); showToast("Todos los datos fueron borrados"); go("home");
    },true);
  },true);
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT / BOOT
// ═══════════════════════════════════════════════════════════════════════════
async function init(){
  let migratedNow=false;
  try{
    migratedNow = await loadState();
    await loadCreds();
  }catch(e){
    console.error(e);
  }
  applyTheme();
  // header bindings
  document.getElementById("home-btn").onclick=()=>go("home");
  document.getElementById("theme-btn").onclick=async()=>{ await setTheme(!darkMode); applyTheme(); };
  document.getElementById("ai-toggle").onclick=async()=>{ await setAiOn(!aiOn); updateStatus(); render(); };
  window.addEventListener("resize",()=>{ renderSidebar(); });
  loaded=true;
  route="home";
  render();
  setSavePill("saved");
  // aviso discreto si se recuperaron datos de una sesión anterior
  if(migratedNow && (materials.length||savedCodes.length||savedAnalyses.length||project.tema)){
    setTimeout(()=>showToast("Se recuperaron tus datos de una sesión anterior ✓"),600);
  }
}
init();
</script>
